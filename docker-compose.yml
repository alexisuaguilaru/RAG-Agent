services:
    chat-service:
        image: ghcr.io/ggml-org/llama.cpp:server
        container_name: chat-service

        depends_on:
            reranker-service:
                condition: service_healthy

        environment:
            - HF_TOKEN=${HF_TOKEN}
            - HF_HOME=/models/.cache
            - OMP_NUM_THREADS=8

        volumes:
            - ~/.cache/llama-cpp:/models

        ports:
            - "8000:8000"

        command: >
            --hf-repo unsloth/Qwen3.5-2B-MTP-GGUF
            --hf-file Qwen3.5-2B-UD-Q8_K_XL.gguf
            -c 8192
            -b 2048
            -ub 2048
            --tools all
            -ngl 0
            -t 8
            --port 8000
            --host 0.0.0.0
            --no-ui

    embedding-service:
        image: vllm/vllm-openai
        container_name: embedding-service

        healthcheck:
            test: [ "CMD-SHELL", "curl -f http://localhost:8001/health || exit 1" ]
            interval: 10s
            timeout: 5s
            retries: 20
            start_period: 10s

        environment:
            - HF_TOKEN=${HF_TOKEN}
            # - HF_HUB_OFFLINE=1

        volumes:
            - ~/.cache/huggingface:/root/.cache/huggingface
            - ./vllm_configs/dev-vllm-embedding.yml:/.config/vllm.yml

        ports:
            - "8001:8001"

        deploy:
            resources:
                reservations:
                    devices:
                        - driver: nvidia
                          count: all
                          capabilities: [ gpu ]

        command: >
            --config /.config/vllm.yml

    reranker-service:
        image: vllm/vllm-openai
        container_name: reranker-service

        healthcheck:
            test: [ "CMD-SHELL", "curl -f http://localhost:8002/health || exit 1" ]
            interval: 10s
            timeout: 5s
            retries: 20
            start_period: 10s

        depends_on:
            embedding-service:
                condition: service_healthy

        environment:
            - HF_TOKEN=${HF_TOKEN}
            # - HF_HUB_OFFLINE=1

        volumes:
            - ~/.cache/huggingface:/root/.cache/huggingface
            - ./vllm_configs/dev-vllm-reranker.yml:/.config/vllm.yml

        ports:
            - "8002:8002"

        deploy:
            resources:
                reservations:
                    devices:
                        - driver: nvidia
                          count: all
                          capabilities: [ gpu ]

        command: >
            --config /.config/vllm.yml
