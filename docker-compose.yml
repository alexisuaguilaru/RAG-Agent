name: rag-agent

services:
    aegra-service:
        build:
            context: ./agent
            dockerfile: Dockerfile
        container_name: aegra-service

        healthcheck:
            test: [ "CMD-SHELL", "curl -sf http://localhost:${PORT:-2026}/health || exit 1" ]
            interval: 5s
            timeout: 10s
            retries: 10

        depends_on:
            chat-service:
                condition: service_healthy
            rag-api:
                condition: service_healthy
            postgres-db:
                condition: service_healthy
            redis-db:
                condition: service_healthy

        environment:
            - POSTGRES_USER=${POSTGRES_USER:-postgres}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres_password}
            - POSTGRES_HOST=postgres-db
            - POSTGRES_DB=agent_db
            - AEGRA_CONFIG=aegra.json
            - AUTH_TYPE=${AUTH_TYPE:-noop}
            - PORT=2026
            - REDIS_BROKER_ENABLED=true
            - REDIS_URL=redis://redis-db:6379/0

        volumes:
            - ./agent/src:/app/src:ro
            - ./agent/aegra.json:/app/aegra.json:ro

        ports:
            - "2026:2026"

    chat-service:
        image: ghcr.io/ggml-org/llama.cpp:server
        container_name: chat-service

        healthcheck:
            test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
            interval: 5s
            timeout: 10s
            retries: 10
            start_period: 10s

        depends_on:
            embedding-service:
                condition: service_healthy
            reranker-service:
                condition: service_healthy

        environment:
            - HF_TOKEN=${HF_TOKEN}
            - HF_HOME=/models/.cache
            - OMP_NUM_THREADS=8

        volumes:
            - ~/.cache/llama-cpp:/models

        ports:
            - "8000:8000"

        command: >
            --hf-repo unsloth/Qwen3.5-2B-MTP-GGUF --hf-file Qwen3.5-2B-UD-Q8_K_XL.gguf -c 0 -b 2048 -ub 2048 --tools all -ngl 0 -t 8 --port 8000 --host 0.0.0.0 --no-ui

    rag-api:
        build:
            context: ./rag_api
            dockerfile: Dockerfile
        container_name: rag-api

        healthcheck:
            test: [ "CMD", "curl", "-f", "http://localhost:6060/health" ]
            interval: 5s
            timeout: 10s
            retries: 10

        depends_on:
            embedding-service:
                condition: service_healthy
            reranker-service:
                condition: service_healthy
            chroma-db:
                condition: service_healthy

        environment:
            EMBEDDING_SERVICE_URL: "http://embedding-service:8001"
            RERANKER_SERVICE_URL: "http://reranker-service:8002"
            CHROMA_HOST: "chroma-db"
            CHROMA_TOKEN: ${TOKEN_CHROMA}

        ports:
            - "6060:6060"

    embedding-service:
        image: vllm/vllm-openai
        container_name: embedding-service

        healthcheck:
            test: [ "CMD-SHELL", "curl -f http://localhost:8001/health || exit 1" ]
            interval: 5s
            timeout: 10s
            retries: 10
            start_period: 10s

        environment:
            - HF_TOKEN=${HF_TOKEN}
            # - HF_HUB_OFFLINE=1

        volumes:
            - ~/.cache/huggingface:/root/.cache/huggingface
            - ./vllm_configs/dev-vllm-embedding.yml:/.config/vllm.yml

        ports:
            - "8001:8001"

        deploy:
            resources:
                reservations:
                    devices:
                        - driver: nvidia
                          count: all
                          capabilities: [ gpu ]

        command: >
            --config /.config/vllm.yml

    reranker-service:
        image: vllm/vllm-openai
        container_name: reranker-service

        healthcheck:
            test: [ "CMD-SHELL", "curl -f http://localhost:8002/health || exit 1" ]
            interval: 5s
            timeout: 10s
            retries: 10
            start_period: 10s

        depends_on:
            embedding-service:
                condition: service_healthy

        environment:
            - HF_TOKEN=${HF_TOKEN}
            # - HF_HUB_OFFLINE=1

        volumes:
            - ~/.cache/huggingface:/root/.cache/huggingface
            - ./vllm_configs/dev-vllm-reranker.yml:/.config/vllm.yml

        ports:
            - "8002:8002"

        deploy:
            resources:
                reservations:
                    devices:
                        - driver: nvidia
                          count: all
                          capabilities: [ gpu ]

        command: >
            --config /.config/vllm.yml

    redis-db:
        image: redis:8.8-alpine
        container_name: redis-db

        healthcheck:
            test: redis-cli ping
            interval: 5s
            timeout: 10s
            retries: 10

        volumes:
            - redis_data:/data

        ports:
            - "6379:6379"
    
    postgres-db:
        image: pgvector/pgvector:pg17
        container_name: postgres-db

        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
            interval: 5s
            timeout: 10s
            retries: 10

        environment:
            - POSTGRES_USER=${POSTGRES_USER:-postgres}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres_password}
            - POSTGRES_DB=agent_db

        volumes:
            - postgres_data:/var/lib/postgresql/data

        ports:
            - "5432:5432"

    chroma-db:
        build:
            context: ./chroma
            dockerfile: Dockerfile
        container_name: chroma-db

        healthcheck:
            test: [ "CMD", "curl", "-f", "http://localhost:7890/api/v2/heartbeat" ]
            interval: 5s
            timeout: 10s
            retries: 10

        environment:
            IS_PERSISTENT: TRUE
            ANONYMITY_OUT_OF_SET: TRUE
            CHROMA_SERVER_AUTH_PROVIDER: "chromadb.auth.token.TokenAuthServerProvider"
            CHROMA_SERVER_AUTH_CREDENTIALS: ${TOKEN_CHROMA}
            CHROMA_SERVER_AUTH_TOKEN_TRANSPORT_HEADER: "X-Chroma-Token"

        volumes:
            - chroma_data:/data
            - ./chroma/config.yaml:/config.yaml

        ports:
            - "7890:7890"

volumes:
    postgres_data:
    redis_data:
    chroma_data: