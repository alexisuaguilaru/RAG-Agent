services:
    chat-service:
        image: vllm/vllm-openai
        container_name: chat-service

        environment:
            - HF_TOKEN=${HF_TOKEN}

        volumes:
            - ~/.cache/huggingface:/root/.cache/huggingface
            - ./vllm_configs/dev-vllm-chat.yml:/.config/vllm.yml

        ports:
            - "8000:8000"

        deploy:
            resources:
                reservations:
                    devices:
                        - driver: nvidia
                          count: all
                          capabilities: [ gpu ]

        command: >
            --config /.config/vllm.yml

    embedding-service:
        image: vllm/vllm-openai
        container_name: embedding-service

        healthcheck:
            test: [ "CMD-SHELL", "curl -f http://localhost:8001/health || exit 1" ]
            interval: 10s
            timeout: 5s
            retries: 20
            start_period: 10s

        environment:
            - HF_TOKEN=${HF_TOKEN}

        volumes:
            - ~/.cache/huggingface:/root/.cache/huggingface
            - ./vllm_configs/dev-vllm-embedding.yml:/.config/vllm.yml

        ports:
            - "8001:8001"

        deploy:
            resources:
                reservations:
                    devices:
                        - driver: nvidia
                          count: all
                          capabilities: [ gpu ]

        command: >
            --config /.config/vllm.yml

    reranker-service:
        image: vllm/vllm-openai
        container_name: reranker-service

        depends_on:
            embedding-service:
                condition: service_healthy

        environment:
            - HF_TOKEN=${HF_TOKEN}

        volumes:
            - ~/.cache/huggingface:/root/.cache/huggingface
            - ./vllm_configs/dev-vllm-reranker.yml:/.config/vllm.yml

        ports:
            - "8002:8002"

        deploy:
            resources:
                reservations:
                    devices:
                        - driver: nvidia
                          count: all
                          capabilities: [ gpu ]

        command: >
            --config /.config/vllm.yml
